name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels:
      - 'semver:minor'
  - title: '🐛 Bug Fixes'
    labels:
      - 'semver:patch'
  - title: '💥 Breaking Changes'
    labels:
      - 'semver:major'

version-resolver:
  major:
    labels:
      - 'semver:major'
  minor:
    labels:
      - 'semver:minor'
  patch:
    labels:
      - 'semver:patch'
  default: patch

template: |
  ## What's Changed

  $CHANGES
