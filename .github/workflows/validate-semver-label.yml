name: Validate semver label

on:
  workflow_dispatch:
  pull_request:
    types: [labeled, unlabeled, opened, reopened]

jobs:
  validate:
    name: Validate semver label
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Require exactly one semver label
        uses: mheap/github-action-required-labels@v4
        with:
          mode: exactly
          count: 1
          labels: "semver:patch, semver:minor, semver:major"
          add_comment: true
