name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.release.tag_name }}

    # 1. Extract version from release tag (e.g. v1.2.3 -> 1.2.3)
    - name: Extract Version
      id: version
      run: |
        $tag = "${{ github.event.release.tag_name }}"
        $ver = $tag.TrimStart('v')
        echo "version=$ver" >> $env:GITHUB_OUTPUT
        echo "tag=$tag" >> $env:GITHUB_OUTPUT
      shell: powershell

    # 2. Update the .csproj version before building
    - name: Update project file version
      uses: vers-one/dotnet-project-version-updater@v1.8
      with:
        file: "HellfireStudios.PlateupModManager.UI/HellfireStudios.PlateupModManager.UI.csproj"
        version: ${{ steps.version.outputs.version }}

    # 3. Build and Publish the WPF App
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore

    - name: Publish
      run: dotnet publish HellfireStudios.PlateupModManager.UI/HellfireStudios.PlateupModManager.UI.csproj -c Release -r win-x64 --self-contained true -o ./publish

    # 4. Zip the publish output
    - name: Zip Release
      run: Compress-Archive -Path ./publish/* -DestinationPath ./PlateupModManager-${{ steps.version.outputs.tag }}.zip
      shell: powershell

    # 5. Upload artifacts to the published release
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.release.tag_name }}
        files: ./PlateupModManager-${{ steps.version.outputs.tag }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
