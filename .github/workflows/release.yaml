name: Build and Release

on:
  pull_request:
    types: [closed]
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  release:
    # Only run if the PR was actually merged, not just closed
    if: github.event.pull_request.merged == true
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. Determine SemVer bump based on PR labels (semver:major, semver:minor, semver:patch)
    - name: Determine Version Bump
      id: bump_type
      run: |
        $labels = '${{ toJson(github.event.pull_request.labels.*.name) }}' | ConvertFrom-Json
        $bump = "patch"

        if ($labels -contains "semver:major") { $bump = "major" }
        elseif ($labels -contains "semver:minor") { $bump = "minor" }
        elseif ($labels -contains "semver:patch") { $bump = "patch" }

        echo "action=$bump" >> $env:GITHUB_OUTPUT
      shell: powershell

    # 2. Get the latest tag to calculate the next version
    - name: Get Latest Tag
      id: get_tag
      run: |
        $tag = git describe --tags --abbrev=0 2>$null
        if (!$tag) { $tag = "v0.0.0" }
        echo "tag=$tag" >> $env:GITHUB_OUTPUT
      shell: powershell

    # 3. Calculate next semantic version
    - name: Calculate Next Version
      id: next_version
      run: |
        $current = "${{ steps.get_tag.outputs.tag }}".TrimStart('v')
        $version = [version]$current
        $bump = "${{ steps.bump_type.outputs.action }}"

        if ($bump -eq "major") {
            $newVersion = [string]::Format("{0}.0.0", ($version.Major + 1))
        } elseif ($bump -eq "minor") {
            $newVersion = [string]::Format("{0}.{1}.0", $version.Major, ($version.Minor + 1))
        } else {
            $newVersion = [string]::Format("{0}.{1}.{2}", $version.Major, $version.Minor, ($version.Build + 1))
        }

        echo "version=$newVersion" >> $env:GITHUB_OUTPUT
        echo "tag=v$newVersion" >> $env:GITHUB_OUTPUT
      shell: powershell

    # 4. Update the .csproj version before building
    - name: Update project file version
      uses: vers-one/dotnet-project-version-updater@v1.8
      with:
        file: "HellfireStudios.PlateupModManager.UI/HellfireStudios.PlateupModManager.UI.csproj"
        version: ${{ steps.next_version.outputs.version }}

    # 5. Build and Publish the WPF App
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore

    - name: Publish
      run: dotnet publish HellfireStudios.PlateupModManager.UI/HellfireStudios.PlateupModManager.UI.csproj -c Release -r win-x64 --self-contained true -o ./publish

    # 6. Zip the publish output
    - name: Zip Release
      run: Compress-Archive -Path ./publish/* -DestinationPath ./PlateupModManager-${{ steps.next_version.outputs.tag }}.zip
      shell: powershell

    # 7. Create Draft Release with Automatic Changelog
    - name: Create Draft Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.next_version.outputs.tag }}
        name: Release ${{ steps.next_version.outputs.tag }}
        draft: true
        generate_release_notes: true
        files: ./PlateupModManager-${{ steps.next_version.outputs.tag }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
